{{- include "rootly-edge-connector.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rootly-edge-connector.fullname" . }}
  labels:
    {{- include "rootly-edge-connector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rootly-edge-connector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.existingActionsConfigMap }}
        checksum/actions: {{ include (print $.Template.BasePath "/actions-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "rootly-edge-connector.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rootly-edge-connector.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-config"
            - "/etc/rootly-edge-connector/config.yml"
            - "-actions"
            - "/etc/rootly-edge-connector/actions.yml"
          env:
            - name: REC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "rootly-edge-connector.secretName" . }}
                  key: {{ .Values.rootly.secretKey }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.metrics.path }}
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.metrics.path }}
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/rootly-edge-connector/config.yml
              subPath: config.yml
              readOnly: true
            - name: actions
              mountPath: /etc/rootly-edge-connector/actions.yml
              subPath: actions.yml
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: log
              mountPath: /var/log/rootly-edge-connector
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rootly-edge-connector.fullname" . }}
        - name: actions
          configMap:
            name: {{ include "rootly-edge-connector.actionsConfigMapName" . }}
        - name: tmp
          emptyDir: {}
        - name: log
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
