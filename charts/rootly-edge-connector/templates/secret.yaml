{{- if and .Values.rootly.apiKey (not .Values.rootly.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rootly-edge-connector.fullname" . }}
  labels:
    {{- include "rootly-edge-connector.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.rootly.secretKey }}: {{ .Values.rootly.apiKey | b64enc | quote }}
{{- end }}
